
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png" />
  <title>REDECOL E.S.P – Control Operativo</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overscroll-behavior-y: contain; }
    #loading-screen {
      position: fixed; inset: 0; background: #2563eb; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999; color: white; transition: opacity 0.5s ease;
    }
    .leaflet-container { height: 100%; width: 100%; border-radius: 1.5rem; z-index: 1; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    .btn-active { transform: scale(0.98); opacity: 0.9; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body>
  <div id="loading-screen">
    <div class="bg-white p-5 rounded-full mb-6 shadow-2xl animate-pulse">
       <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </div>
    <h2 class="text-2xl font-black tracking-tighter uppercase">REDECOL E.S.P</h2>
    <p class="text-blue-200 text-xs mt-2 font-semibold tracking-widest uppercase">Sistema de Control GPS</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MapComponent = ({ points, operator }) => {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const polyline = useRef(null);
      const marker = useRef(null);

      useEffect(() => {
        if (!mapInstance.current && mapRef.current) {
          mapInstance.current = L.map(mapRef.current, { zoomControl: false }).setView([7.0653, -73.8547], 15);
          L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapInstance.current);
        }
      }, []);

      useEffect(() => {
        if (mapInstance.current && points.length > 0) {
          const coords = points.map(p => [p.lat, p.lng]);
          if (polyline.current) polyline.current.setLatLngs(coords);
          else polyline.current = L.polyline(coords, { color: '#2563eb', weight: 6, opacity: 0.8 }).addTo(mapInstance.current);

          const last = coords[coords.length - 1];
          if (marker.current) marker.current.setLatLng(last);
          else marker.current = L.circleMarker(last, { radius: 8, color: '#fff', fillColor: '#2563eb', fillOpacity: 1, weight: 3 }).addTo(mapInstance.current);

          mapInstance.current.panTo(last);
        }
      }, [points]);

      return <div ref={mapRef} className="w-full h-full shadow-inner bg-slate-100" />;
    };

    const App = () => {
      const [operador, setOperador] = useState('');
      const [isTracking, setIsTracking] = useState(false);
      const [points, setPoints] = useState([]);
      const watchId = useRef(null);

      const toggleTracking = () => {
        if (!operador) return alert('Por favor, ingresa el nombre del operario.');

        if (!isTracking) {
          setPoints([]);
          setIsTracking(true);
          watchId.current = navigator.geolocation.watchPosition(
            (pos) => {
              const p = { lat: pos.coords.latitude, lng: pos.coords.longitude, time: new Date().toLocaleTimeString() };
              setPoints(prev => [...prev, p]);
            },
            (err) => alert('Error GPS: Asegúrate de tener el GPS encendido'),
            { enableHighAccuracy: true }
          );
        } else {
          navigator.geolocation.clearWatch(watchId.current);
          setIsTracking(false);
          alert('Ruta finalizada. Puedes descargar el reporte.');
        }
      };

      const downloadCSV = () => {
        const header = "Hora,Latitud,Longitud\n";
        const rows = points.map(p => `${p.time},${p.lat},${p.lng}`).join("\n");
        const blob = new Blob([header + rows], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Ruta_REDECOL_${operador}.csv`;
        a.click();
      };

      return (
        <div className="flex flex-col min-h-screen bg-slate-50">
          <header className="bg-blue-600 p-4 text-white shadow-md flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className="bg-white text-blue-600 px-1.5 py-0.5 rounded font-black text-[10px]">RE</div>
              <span className="font-black text-sm uppercase tracking-tighter">REDECOL E.S.P</span>
            </div>
            {isTracking && (
              <div className="flex items-center gap-2 bg-blue-500 px-3 py-1 rounded-full animate-pulse">
                <div className="w-2 h-2 bg-white rounded-full"></div>
                <span className="text-[10px] font-bold uppercase">Grabando</span>
              </div>
            )}
          </header>

          <main className="flex-1 p-4 flex flex-col gap-4 max-w-md mx-auto w-full">
            <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100">
              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Nombre del Reciclador</label>
              <input 
                type="text" 
                value={operador}
                onChange={(e) => setOperador(e.target.value)}
                placeholder="Ej: Juan Perez"
                className="w-full bg-slate-50 p-4 rounded-2xl text-blue-900 font-bold border-none ring-0 focus:bg-white focus:shadow-md transition-all outline-none mb-4"
                disabled={isTracking}
              />
              <button 
                onClick={toggleTracking}
                className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all ${isTracking ? 'bg-red-500 shadow-red-200' : 'bg-blue-600 shadow-blue-200'} text-white shadow-xl active:scale-95`}
              >
                {isTracking ? 'Finalizar Recorrido' : 'Iniciar Seguimiento'}
              </button>
            </div>

            <div className="flex-1 h-80 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg relative">
              <MapComponent points={points} operator={operador} />
              <div className="absolute bottom-4 left-4 right-4 z-[400] glass p-3 rounded-2xl flex justify-between items-center border border-white">
                <div className="flex flex-col">
                  <span className="text-[9px] font-black text-slate-400 uppercase">Puntos</span>
                  <span className="text-lg font-black text-blue-600">{points.length}</span>
                </div>
                <button 
                  onClick={downloadCSV}
                  disabled={points.length === 0 || isTracking}
                  className="bg-slate-900 text-white text-[10px] font-black px-4 py-2 rounded-xl disabled:opacity-20 uppercase tracking-widest"
                >
                  Reporte
                </button>
              </div>
            </div>
          </main>

          <footer className="p-6 text-center">
            <p className="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">REDECOL E.S.P • Barrancabermeja 2024</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }, 1500);
    });
  </script>
</body>
</html>
