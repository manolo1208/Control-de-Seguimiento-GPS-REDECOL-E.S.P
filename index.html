
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png" />
  <title>REDECOL E.S.P – Control Operativo</title>
  
  <!-- Estilos y Dependencias -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      overscroll-behavior-y: contain;
      background-color: #f8fafc;
    }
    .leaflet-container { height: 100%; width: 100%; border-radius: 0.75rem; }
    ::-webkit-scrollbar { display: none; }
    
    /* Pantalla de carga */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #2563eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      transition: opacity 0.5s ease;
    }
  </style>

<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body>
  <!-- Splash Screen de REDECOL -->
  <div id="loading-screen">
    <div class="bg-white p-3 rounded-2xl mb-4 shadow-2xl animate-bounce">
       <svg class="w-12 h-12 text-blue-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </div>
    <h2 class="text-xl font-black uppercase tracking-widest">REDECOL E.S.P</h2>
    <p class="text-blue-100 text-xs mt-2 font-medium">Iniciando Sistema de Control...</p>
  </div>

  <div id="root"></div>

  <!-- Este es el punto de entrada que faltaba -->
  <script type="module" src="index.tsx"></script>

  <script>
    // Quitar pantalla de carga cuando la app esté lista
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) loader.style.opacity = '0';
        setTimeout(() => loader?.remove(), 500);
      }, 1000);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
